<section class="page-header py-4">
    <div class="container">
        <div class="page-header-shell d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
            <div class="page-header-copy">
                <span class="page-header-kicker">{{ parent|default:'Smart E-Learning' }}</span>
                <h1 class="h4 mb-1">{{ title }}</h1>
                {% if subtitle %}<p class="text-muted mb-0">{{ subtitle }}</p>{% endif %}
            </div>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a class="text-decoration-none" href="{% url 'core:home' %}">Home</a></li>
                    {% if parent %}<li class="breadcrumb-item">{{ parent }}</li>{% endif %}
                    <li class="breadcrumb-item active" aria-current="page">{{ title }}</li>
                </ol>
            </nav>
        </div>
    </div>
</section>
